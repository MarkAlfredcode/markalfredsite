<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exclusives — Mark Alfred Dot News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* ── subpage layout ── */
.page-hero{
  display:grid;
  grid-template-columns:1.6fr 1fr;
  align-items:stretch;
  border-bottom:3px double var(--rule);
  padding-bottom:22px;
}
.hero-left{
  display:flex;
  flex-direction:column;
  border-right:1px solid var(--rule);
  padding-right:20px;
}
.section-tag{
  display:block;
  font-family:Georgia,"Times New Roman",serif;
  font-size:clamp(44px,6vw,70px);
  font-weight:700;
  line-height:.9;
  letter-spacing:-0.02em;
  color:var(--ink);
  -webkit-text-stroke:.5px var(--ink);
  text-stroke:.5px var(--ink);
  paint-order:stroke fill;
  padding:14px 0 10px;
  text-transform:uppercase;
  position:relative;
  z-index:0;
}
.hero-photo{
  width:100%;
  aspect-ratio:3/2;
  position:relative;
  z-index:2;
  margin-top:-28px;
}
.v-credit{
  position:absolute;
  left:5px;
  bottom:10px;
  writing-mode:vertical-rl;
  transform:rotate(180deg);
  font-family:"Archivo",sans-serif;
  font-size:8.5px;
  color:rgba(22,19,12,.45);
  letter-spacing:.05em;
  white-space:nowrap;
  z-index:2;
}
.hero-right{
  padding-left:20px;
  display:flex;
  flex-direction:column;
}
.hero-hed{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:14px 4px;
  border-bottom:1px solid var(--rule-soft);
}
.hero-hed:last-child{border-bottom:none}
.hero-hed.lead{align-items:flex-start;justify-content:flex-start;text-align:left;}
.hero-hed.lead .hero-deck{text-align:left;}
.hero-hed.lead .readmore{align-self:center;margin-top:12px;}
.hero-hed .hl{display:block}
.hero-hed.lead .hl{font-size:clamp(17px,1.9vw,22px)}
.hero-hed .hl{font-size:clamp(15px,1.7vw,20px)}

/* exclusive badge */
.kicker.excl{
  background:var(--red);
  color:#fff;
  padding:2px 7px;
  display:inline-block;
  margin-bottom:7px;
  font-size:10px;
  letter-spacing:.15em;
}

/* ── story rows ── */
.page-story{
  display:grid;
  grid-template-columns:1fr 1.6fr;
  gap:28px;
  padding:22px 0;
  border-bottom:1px solid var(--rule);
  align-items:start;
}
.page-story:last-child{border-bottom:none}
.s-txt .s-hl{
  font-family:Georgia,"Times New Roman",serif;
  font-size:clamp(18px,2vw,23px);
  font-weight:400;
  line-height:1.1;
  letter-spacing:-0.01em;
  color:var(--ink);
  text-decoration:none;
  display:block;
  margin-bottom:9px;
  -webkit-text-stroke:.6px currentColor;
  text-stroke:.6px currentColor;
  paint-order:stroke fill;
  transition:color .15s;
}
.s-txt .s-hl:hover{color:var(--red)}
.s-txt .body-txt{margin-top:0}
.s-img .credit{margin-top:3px}
nav a{color:var(--muted)}
nav a:hover{color:var(--red)}
.social a{border-color:var(--rule-soft)}

@media(max-width:860px){
  .page-hero{grid-template-columns:1fr}
  .hero-left{border-right:none;padding-right:0;padding-bottom:16px;border-bottom:1px solid var(--rule)}
  .hero-right{padding-left:0;padding-top:14px}
  .page-story{grid-template-columns:1fr;gap:14px}
  .s-img{order:-1}
}
.masthead-sm{
  font-family:"Chomsky",serif;
  font-size:clamp(18px,2.4vw,28px);
  font-weight:400;
  letter-spacing:-0.02em;
  line-height:1;
  text-align:center;
  text-transform:none;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  white-space:nowrap;
}
.masthead-sm a{color:var(--ink);text-decoration:none}
.hero-deck{
  font-size:13px;
  line-height:1.42;
  color:var(--ink-soft);
  margin-top:8px;
  text-align:center;
  hyphens:auto;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="utility">
    <div class="date">For the first and only time it is<br><span id="js-date"></span></div>
    <div class="masthead-sm"><a href="index.html">Mark Alfred Dot News</a></div>
    <div class="day" id="js-day"></div>
  </div>

  <nav>
    <ul>
      <li><a href="news.html">News</a></li>
      <li><a href="photojournalism.html">Photojournalism</a></li>
      <li><a href="exclusives.html" style="color:var(--red)">Exclusives</a></li>
      <li><a href="#">About</a></li>
    </ul>
    <div class="social">
      <a href="#" title="X" aria-label="X">𝕏</a>
      <a href="https://www.notus.org/mark-alfred" title="NOTUS" aria-label="NOTUS">N</a>
      <a href="https://www.linkedin.com/in/mark-alfred/" title="LinkedIn" aria-label="LinkedIn">in</a>
    </div>
    <ul>
      <li><a href="#">The Star</a></li>
      <li><a href="#">Politics</a></li>
      <li><a href="#">Trump</a></li>
      <li><a href="#">Local</a></li>
      <li><a href="#">Games</a></li>
      <li><a href="#">Send a News Tip</a></li>
    </ul>
  </nav>

  <!-- hero: section tag + image LEFT | 3 headlines RIGHT -->
  <div class="page-hero">
    <div class="hero-left">
      <span class="section-tag">Exclusives</span>
      <div class="photo hero-photo">
        <span class="tag">Photograph</span>
        <span class="v-credit"></span>
      </div>
    </div>
    <div class="hero-right">
      <div class="hero-hed lead"></div>
      <div class="hero-hed"></div>
      <div class="hero-hed"></div>
    </div>
  </div>

  <!-- story rows: text LEFT | image RIGHT -->
  <div class="page-stories"></div>

  <footer>
    <div class="wordmark">Mark Alfred Dot News</div>
    <div class="credits">Designed and Developed by <b>Mark Alfred</b></div>
  </footer>

</div>
<script>
(function(){
  var now=new Date();
  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var e=document.getElementById('js-date');
  var d=document.getElementById('js-day');
  if(e) e.textContent=months[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();
  if(d) d.textContent=days[now.getDay()].toUpperCase();
})();

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderHero(rows){
  var lead=rows.filter(function(r){return r.section==='hero-lead';})[0];
  var h2=rows.filter(function(r){return r.section==='hero-2';})[0];
  var h3=rows.filter(function(r){return r.section==='hero-3';})[0];
  if(lead){
    var hp=document.querySelector('.hero-photo');
    if(hp){
      if(lead.image){
        hp.innerHTML='<img src="'+esc(lead.image)+'" alt="'+esc(lead.caption||'')+'" style="width:100%;height:100%;object-fit:cover;display:block;">'
          +(lead.caption?'<span class="v-credit">'+esc(lead.caption)+'</span>':'');
      } else {
        var vc=hp.querySelector('.v-credit');
        if(vc&&lead.caption) vc.textContent=lead.caption;
      }
    }
    var lh=document.querySelector('.hero-hed.lead');
    if(lh) lh.innerHTML=
      '<span class="kicker excl">Exclusive</span>'+
      '<a class="hl" href="'+esc(lead.link||'#')+'">'+lead.headline+'</a>'+
      (lead.body?'<p class="hero-deck">'+esc(lead.body)+'</p>':'')+
      '<a class="readmore" href="'+esc(lead.link||'#')+'">Read More</a>';
  }
  var heds=document.querySelectorAll('.hero-hed:not(.lead)');
  if(h2&&heds[0]) heds[0].innerHTML=
    '<a class="hl" href="'+esc(h2.link||'#')+'">'+h2.headline+'</a>'+
    '<a class="readmore" href="'+esc(h2.link||'#')+'">Read More</a>';
  if(h3&&heds[1]) heds[1].innerHTML=
    '<a class="hl" href="'+esc(h3.link||'#')+'">'+h3.headline+'</a>'+
    '<a class="readmore" href="'+esc(h3.link||'#')+'">Read More</a>';
}

function renderStories(rows){
  var stories=rows.filter(function(r){return r.section==='story';});
  var container=document.querySelector('.page-stories');
  if(!container||!stories.length) return;
  container.innerHTML='';
  stories.forEach(function(item){
    var imgHTML=item.image
      ?'<img src="'+esc(item.image)+'" alt="'+esc(item.headline)+'" style="width:100%;display:block;object-fit:cover;">'
      :'<div class="photo ar-wide"><span class="tag">Photograph</span></div>';
    var creditHTML=item.caption?'<div class="credit">'+esc(item.caption)+'</div>':'';
    var div=document.createElement('div');
    div.className='page-story';
    div.innerHTML=
      '<div class="s-txt">'+
        '<span class="kicker excl">Exclusive</span>'+
        '<a class="s-hl" href="'+esc(item.link||'#')+'">'+item.headline+'</a>'+
        (item.body?'<p class="body-txt">'+item.body+'</p>':'')+
        '<a class="readmore" href="'+esc(item.link||'#')+'">Read More</a>'+
      '</div>'+
      '<div class="s-img">'+imgHTML+creditHTML+'</div>';
    container.appendChild(div);
  });
}

function parseCSV(text){
  var lines=text.trim().split('\n');
  var headers=lines[0].split(',').map(function(h){return h.trim().replace(/^"|"$/g,'');});
  return lines.slice(1).map(function(line){
    var vals=[],cur='',inQ=false;
    for(var i=0;i<line.length;i++){
      var c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){vals.push(cur.trim().replace(/^"|"$/g,''));cur='';}
      else{cur+=c;}
    }
    vals.push(cur.trim().replace(/^"|"$/g,''));
    var obj={};
    headers.forEach(function(h,i){obj[h]=vals[i]||'';});
    return obj;
  });
}

var FALLBACK=[
  {section:'hero-lead',outlet:'NOTUS',image:'',caption:'Photo by Mark Alfred / NOTUS',headline:'The Bulk of Biden’s Infrastructure Spending Will Likely Be Put Under Trump',body:'Corner spent more than a year investigating how the Biden administration structured its signature infrastructure law in ways that leave the bulk of unspent funds exposed to executive rescission or redirection.',link:'#'},
  {section:'hero-2',outlet:'NOTUS',headline:'Senate Democrats Want the Full FBI File on the Matt Gaetz Investigation',link:'#'},
  {section:'hero-3',outlet:'NOTUS',headline:'‘RedNote’ Becomes a ‘Red Scare’: Republicans Already Want to Ban This TikTok Alternative',link:'#'},
  {section:'story',outlet:'NOTUS',image:'',caption:'Photo by Mark Alfred / NOTUS',headline:'Frontline Democrats Urge Support for Jared Huffman in Natural Resources Race',body:'A bloc of vulnerable House Democrats is quietly pressing leadership to back their preferred candidate ahead of a closely watched committee election that could shape the party’s environmental agenda for years.',link:'#'},
  {section:'story',outlet:'NOTUS',image:'',caption:'Photo by Mark Alfred / NOTUS',headline:'California Republicans Want to Claw Back Funding for Their Own State on High-Speed Rail',body:'A faction of House Republicans from California is pressing to redirect billions away from the state’s beleaguered rail project, creating an unusual intraparty rift with Sacramento over how to use federal infrastructure dollars.',link:'#'},
  {section:'story',outlet:'NOTUS',image:'',caption:'Photo by Mark Alfred / NOTUS',headline:'Lawmakers Scoff at Surgeon General’s Bid to Label Alcohol a Cancer Risk',body:'The advisory, which recommended warning labels on alcohol, landed to immediate skepticism on both sides of the aisle. Members questioned the science and the political timing heading into a crowded legislative calendar.',link:'#'}
];
renderHero(FALLBACK);
renderStories(FALLBACK);

var SHEET_CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vTxG1-O_pAnuEfQPqHRHacye8pBf0dN3NHzITJdchGEeM_7xVjVJavZ7zBsvrJtSfumMFCs-jRn8jrl/pub?gid=2100641153&single=true&output=csv';
fetch(SHEET_CSV)
  .then(function(r){return r.text();})
  .then(function(text){
    var rows=parseCSV(text);
    if(rows.some(function(r){return r.section&&r.headline;})){
      renderHero(rows);
      renderStories(rows);
    }
  })
  .catch(function(e){console.error('Sheet load failed:',e);});
</script>
</body>
</html>
