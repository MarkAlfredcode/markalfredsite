<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade — Mark Alfred Dot News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.masthead-sm{
  font-family:"Chomsky",serif;
  font-size:clamp(18px,2.4vw,28px);
  font-weight:400;
  letter-spacing:-0.02em;
  line-height:1;
  text-transform:none;
  position:static;
  transform:none;
  white-space:nowrap;
}
.masthead-sm a{color:var(--ink);text-decoration:none}
.utility{align-items:center;padding:8px 0}
nav a{color:var(--muted)}
nav a:hover{color:var(--red)}
.social a{border-color:var(--rule-soft)}

.press-head{text-align:center;padding:26px 0 18px}
.press-title{
  font-family:Georgia,"Times New Roman",serif;
  font-weight:700;
  font-size:clamp(28px,4.4vw,44px);
  letter-spacing:-0.02em;
  text-transform:uppercase;
  color:var(--ink);
}
.press-sub{
  font-family:"Libre Caslon Text",serif;
  font-style:italic;
  font-size:14px;
  color:var(--ink-soft);
  margin-top:6px;
}

/* ── full-screen press: canvas fills the whole viewport, corner to corner ── */
.press-full{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  height:100dvh;
  background:#0b0d10;
  overflow:hidden;
  z-index:3; /* above the paper-noise overlay */
}
#press{
  display:block;
  width:100%;
  height:100%;
  image-rendering:pixelated;
  image-rendering:-moz-crisp-edges;
  image-rendering:crisp-edges;
}

/* ── arcade select overlay: pixel-bordered menu over the warehouse ── */
.arcade-scrim{
  position:fixed; inset:0; z-index:4;
  background:radial-gradient(ellipse at 50% 45%, rgba(8,10,16,0.35) 0%, rgba(6,8,13,0.72) 62%, rgba(4,6,10,0.86) 100%);
  display:flex; align-items:center; justify-content:center;
  padding:32px 38px;
  overflow:hidden;
  box-sizing:border-box;
}
.arcade-panel{
  width:100%;
  max-width:720px;
  background:#16130c;
  padding:6px;
  image-rendering:pixelated;
  box-shadow:
    0 0 0 6px #16130c,
    0 0 0 10px #cbc5b6,
    0 0 0 14px #16130c,
    0 18px 0 14px rgba(0,0,0,0.4);
}
.arcade-inner{
  background:#1c1912;
  padding:36px 32px 32px;
}
.arcade-eyebrow{
  font-family:"Archivo",sans-serif;
  font-size:11px;
  font-weight:800;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:#b3271b;
  text-align:center;
  margin-bottom:6px;
}
.arcade-title{
  font-family:Georgia,"Times New Roman",serif;
  font-weight:700;
  font-size:clamp(24px,3.6vw,36px);
  letter-spacing:-0.01em;
  text-transform:uppercase;
  color:#f5f2ea;
  text-align:center;
  margin-bottom:28px;
}
.arcade-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}
@media(max-width:520px){ .arcade-grid{grid-template-columns:1fr} }
.arcade-card{
  display:block;
  text-decoration:none;
  background:#100e09;
  padding:3px;
  box-shadow:0 0 0 3px #3a3327, 0 0 0 4px #100e09;
  transition:box-shadow .12s, transform .12s;
}
.arcade-card:hover{
  box-shadow:0 0 0 3px #b3271b, 0 0 0 4px #100e09;
  transform:translateY(-2px);
}
.arcade-card-inner{
  padding:22px 16px 18px;
  text-align:center;
  background:#211d14;
}
.arcade-icon{
  width:48px; height:48px;
  margin:0 auto 14px;
  image-rendering:pixelated;
}
.arcade-card-title{
  font-family:"Archivo",sans-serif;
  font-weight:800;
  font-size:15px;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:#f5f2ea;
}
.arcade-card-sub{
  font-family:"Archivo",sans-serif;
  font-size:10.5px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#8a8378;
  margin-top:6px;
}
.arcade-back{
  display:block;
  text-align:center;
  margin-top:26px;
  font-family:"Archivo",sans-serif;
  font-size:10.5px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:#8a8378;
  text-decoration:none;
}
.arcade-back:hover{color:#f5f2ea}
</style>
</head>
<body>

<div class="press-full">
  <canvas id="press" width="320" height="320"></canvas>
</div>

<div class="arcade-scrim">
  <div class="arcade-panel">
    <div class="arcade-inner">
      <div class="arcade-eyebrow">The Press Room</div>
      <div class="arcade-title">Select A Game</div>
      <div class="arcade-grid">
        <a class="arcade-card" href="games.html">
          <div class="arcade-card-inner">
            <canvas class="arcade-icon" width="16" height="16" data-icon="politicle"></canvas>
            <div class="arcade-card-title">Politicle</div>
            <div class="arcade-card-sub">Guess the politician</div>
          </div>
        </a>
        <a class="arcade-card" href="war-chest.html">
          <div class="arcade-card-inner">
            <canvas class="arcade-icon" width="16" height="16" data-icon="warchest"></canvas>
            <div class="arcade-card-title">War Chest</div>
            <div class="arcade-card-sub">Campaign finance game</div>
          </div>
        </a>
        <a class="arcade-card" href="no-comment.html">
          <div class="arcade-card-inner">
            <canvas class="arcade-icon" width="16" height="16" data-icon="nocomment"></canvas>
            <div class="arcade-card-title">No Comment</div>
            <div class="arcade-card-sub">Dodge the press</div>
          </div>
        </a>
      </div>
      <a class="arcade-back" href="index.html">&larr; Back to the front page</a>
    </div>
  </div>
</div>
<script src="press-scene.js"></script>
<script>
(function(){
  function px(c,cells){
    var g=c.getContext('2d'); g.imageSmoothingEnabled=false;
    cells.forEach(function(r){ g.fillStyle=r[2]; g.fillRect(r[0],r[1],r[3]||1,r[4]||1); });
  }
  var ICONS={
    politicle:[
      [3,6,'#7a5a34',10,8],[3,6,'#8f6d42',10,1],
      [6,2,'#f5f2ea',4,6],[6,2,'#cbc5b6',4,1],
      [7,4,'#b3271b',1,1],[8,5,'#b3271b',1,1],[7,6,'#b3271b',1,1],
      [4,10,'#d9b23a',2,2],[10,10,'#d9b23a',2,2]
    ],
    warchest:[
      [2,7,'#7a5a34',12,7],[2,5,'#5f4526',12,3],[2,5,'#8f6d42',12,1],
      [2,7,'#4a3720',12,1],
      [7,7,'#d9b23a',2,3],[7,8,'#6b4f22',2,1]
    ],
    nocomment:[
      [4,2,'#26324a',8,10],[4,2,'#38466a',8,1],
      [6,4,'#d8a878',4,3],[6,4,'#6b6257',4,1],
      [7,7,'#f2efe6',2,5],[7,7,'#b3271b',1,5],
      [2,3,'#3f5d52',3,4],[1,3,'#111111',2,2],
      [11,10,'#d9b23a',3,3]
    ]
  };
  Array.prototype.forEach.call(document.querySelectorAll('canvas[data-icon]'),function(c){
    px(c,ICONS[c.getAttribute('data-icon')]||[]);
  });
})();
</script>
</body>
</html>
