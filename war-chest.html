<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War Chest — Mark Alfred Dot News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.masthead-sm{
  font-family:"Chomsky",serif;
  font-size:clamp(18px,2.4vw,28px);
  font-weight:400;
  letter-spacing:-0.02em;
  line-height:1;
  text-transform:none;
  position:static;
  transform:none;
  white-space:nowrap;
}
.masthead-sm a{color:var(--ink);text-decoration:none}
.utility{align-items:center;padding:8px 0 10px;border-bottom:3px double var(--rule)}

/* ── game page ── */
.game-head{
  text-align:center;
  padding:16px 0 0;
}
.game-title{
  font-family:Georgia,"Times New Roman",serif;
  font-weight:700;
  font-size:clamp(32px,5vw,48px);
  letter-spacing:-0.02em;
  color:var(--ink);
  text-transform:uppercase;
}
.game-sub{
  font-family:"Libre Caslon Text",serif;
  font-style:italic;
  font-size:14px;
  color:var(--ink-soft);
  margin-top:6px;
}

.game-wrap{
  max-width:640px;
  margin:0 auto;
  padding:8px 0 40px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}

.streak{
  font-family:"Archivo",sans-serif;
  font-size:12.5px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-soft);
}
.streak b{color:#4a6b4d;font-size:16px}

.cards{
  display:flex;
  align-items:stretch;
  gap:0;
  width:100%;
  border:2px solid var(--rule);
}
.card{
  flex:1;
  padding:22px 16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}
.card.current{background:var(--paper-2)}
.card + .card{border-left:2px solid var(--rule)}
.card img{
  width:104px;
  height:104px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--ink);
  margin-bottom:12px;
}
.card .name{
  font-family:Georgia,"Times New Roman",serif;
  font-size:17px;
  color:var(--ink);
  margin-bottom:3px;
}
.card .role{
  font-family:"Archivo",sans-serif;
  font-size:10.5px;
  color:var(--muted);
  letter-spacing:.02em;
  margin-bottom:14px;
  min-height:26px;
}
.card .cash{
  font-family:"Archivo",sans-serif;
  font-weight:800;
  font-size:22px;
  color:var(--ink);
  letter-spacing:-0.01em;
}
.card .cash.hidden{color:var(--rule-soft);letter-spacing:.15em}
.card .cash-label{
  font-family:"Archivo",sans-serif;
  font-size:9.5px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:4px;
}
.vs{
  font-family:Georgia,"Times New Roman",serif;
  font-style:italic;
  font-size:14px;
  color:var(--muted);
  align-self:center;
  padding:0 6px;
}

.guess-row{display:flex;gap:14px;width:100%}
.guess-btn{
  flex:1;
  font-family:"Archivo",sans-serif;
  font-size:13px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
  background:var(--ink);
  color:var(--paper);
  border:none;
  padding:16px 10px;
  cursor:pointer;
  transition:background .15s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.guess-btn:hover{background:var(--red)}
.guess-btn:disabled{opacity:.4;cursor:default;background:var(--ink)}
.guess-arrow{font-size:16px;line-height:1}

.result-banner{
  font-family:"Archivo",sans-serif;
  font-size:13px;
  font-weight:700;
  letter-spacing:.05em;
  text-transform:uppercase;
  text-align:center;
  min-height:18px;
}
.result-banner.correct{color:#4a6b4d}
.result-banner.wrong{color:var(--red)}

.game-over{
  text-align:center;
  border-top:1px solid var(--rule-soft);
  padding-top:20px;
  display:none;
  width:100%;
}
.game-over.show{display:block}
.game-over .final{
  font-family:Georgia,"Times New Roman",serif;
  font-size:22px;
  color:var(--ink);
}
.game-over .final b{color:var(--red)}
.game-over .best{
  font-family:"Libre Caslon Text",serif;
  font-style:italic;
  font-size:13px;
  color:var(--ink-soft);
  margin-top:4px;
}
.replay-btn{
  margin-top:16px;
  font-family:"Archivo",sans-serif;
  font-size:11px;
  font-weight:800;
  letter-spacing:.1em;
  text-transform:uppercase;
  background:var(--red);
  color:#fff;
  border:none;
  padding:10px 22px;
  cursor:pointer;
  transition:background .15s;
}
.replay-btn:hover{background:var(--red-dark)}

.lb-submit{
  margin-top:18px;
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
}
.lb-submit input{
  font-family:"Archivo",sans-serif;
  font-size:13px;
  border:1.5px solid var(--ink);
  background:var(--paper);
  color:var(--ink);
  padding:9px 12px;
  width:180px;
  max-width:60vw;
}
.lb-submit input:focus{outline:none;border-color:var(--red)}
.lb-submit-btn{
  font-family:"Archivo",sans-serif;
  font-size:11px;
  font-weight:800;
  letter-spacing:.1em;
  text-transform:uppercase;
  background:var(--ink);
  color:var(--paper);
  border:none;
  padding:0 18px;
  cursor:pointer;
  transition:background .15s;
}
.lb-submit-btn:hover{background:var(--red)}
.lb-submit-btn:disabled{opacity:.4;cursor:default}
.lb-status{
  font-family:"Archivo",sans-serif;
  font-size:11px;
  letter-spacing:.04em;
  color:var(--ink-soft);
  margin-top:8px;
  min-height:14px;
}
.lb-status.ok{color:#4a6b4d}

.leaderboard{
  width:100%;
  max-width:420px;
  margin:0 auto;
  border-top:3px double var(--rule);
  padding-top:18px;
}
.lb-title{
  font-family:"Archivo",sans-serif;
  font-size:11px;
  font-weight:800;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--muted);
  text-align:center;
  margin-bottom:12px;
}
.lb-list{list-style:none}
.lb-row{
  display:flex;
  align-items:baseline;
  gap:10px;
  padding:7px 2px;
  border-bottom:1px solid var(--rule-soft);
  font-family:"Archivo",sans-serif;
  font-size:13px;
}
.lb-row:last-child{border-bottom:none}
.lb-rank{
  font-weight:800;
  color:var(--muted);
  width:20px;
  flex:0 0 auto;
}
.lb-row:nth-child(1) .lb-rank{color:#b8923f}
.lb-name{
  flex:1;
  color:var(--ink);
  font-weight:600;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.lb-streak{font-weight:800;color:#4a6b4d}
.lb-empty{
  text-align:center;
  font-family:"Libre Caslon Text",serif;
  font-style:italic;
  font-size:13px;
  color:var(--ink-soft);
  padding:8px 0;
}

@media(max-width:520px){
  .cards{flex-direction:column}
  .card + .card{border-left:none;border-top:2px solid var(--rule)}
  .vs{display:none}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="utility">
    <div class="masthead-sm"><a href="index.html">Mark Alfred Dot News</a></div>
    <div class="day" id="js-day"></div>
  </div>

  <div class="game-head">
    <div class="game-title">War Chest</div>
    <div class="game-sub">Higher or lower? Guess whose campaign cash-on-hand is bigger.</div>
  </div>

  <div class="game-wrap">
    <div class="streak">Streak: <b id="streak-num">0</b></div>

    <div class="cards">
      <div class="card current" id="card-a">
        <img id="card-a-img" src="" alt="">
        <div class="name" id="card-a-name"></div>
        <div class="role" id="card-a-role"></div>
        <div class="cash-label">Cash on hand</div>
        <div class="cash" id="card-a-cash"></div>
      </div>
      <div class="vs">vs</div>
      <div class="card" id="card-b">
        <img id="card-b-img" src="" alt="">
        <div class="name" id="card-b-name"></div>
        <div class="role" id="card-b-role"></div>
        <div class="cash-label">Cash on hand</div>
        <div class="cash hidden" id="card-b-cash">?????</div>
      </div>
    </div>

    <div class="result-banner" id="result-banner"></div>

    <div class="guess-row" id="guess-row">
      <button class="guess-btn" id="btn-higher"><span class="guess-arrow">&#8593;</span> Higher</button>
      <button class="guess-btn" id="btn-lower"><span class="guess-arrow">&#8595;</span> Lower</button>
    </div>

    <div class="game-over" id="game-over">
      <div class="final">Final streak: <b id="final-streak">0</b></div>
      <div class="best">Best this session: <span id="best-streak">0</span></div>
      <form class="lb-submit" id="lb-submit-form">
        <input type="text" id="lb-name-input" placeholder="Your name" maxlength="20" autocomplete="off">
        <button type="submit" class="lb-submit-btn" id="lb-submit-btn">Submit Score</button>
      </form>
      <div class="lb-status" id="lb-status"></div>
      <button class="replay-btn" id="replay-btn">Play Again</button>
    </div>

    <div class="leaderboard">
      <div class="lb-title">Leaderboard — Top Streaks</div>
      <ol class="lb-list" id="lb-list"></ol>
    </div>
  </div>

  <footer>
    <div class="wordmark">Mark Alfred Dot News</div>
    <div class="credits">Designed and Developed by <b>Mark Alfred</b></div>
  </footer>

</div>

  if(d) d.textContent=days[now.getDay()].toUpperCase();
})();

function fmtCash(n){
  return '$'+n.toLocaleString('en-US');
}

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}

var BEST_KEY='warchest-best';
var deck, pos, streak, best, locked;

function loadBest(){
  var v=parseInt(localStorage.getItem(BEST_KEY),10);
  return isNaN(v)?0:v;
}
function saveBest(v){localStorage.setItem(BEST_KEY,String(v));}

var elA={img:document.getElementById('card-a-img'),name:document.getElementById('card-a-name'),role:document.getElementById('card-a-role'),cash:document.getElementById('card-a-cash')};
var elB={card:document.getElementById('card-b'),img:document.getElementById('card-b-img'),name:document.getElementById('card-b-name'),role:document.getElementById('card-b-role'),cash:document.getElementById('card-b-cash')};
var streakNumEl=document.getElementById('streak-num');
var resultEl=document.getElementById('result-banner');
var guessRowEl=document.getElementById('guess-row');
var gameOverEl=document.getElementById('game-over');
var btnHigher=document.getElementById('btn-higher');
var btnLower=document.getElementById('btn-lower');

function renderA(m){
  elA.img.src=m.photo;elA.img.alt=m.name;
  elA.name.textContent=m.name;
  elA.role.textContent=m.role;
  elA.cash.textContent=fmtCash(m.cash);
}
function renderB(m){
  elB.img.src=m.photo;elB.img.alt=m.name;
  elB.name.textContent=m.name;
  elB.role.textContent=m.role;
  elB.cash.textContent='?????';
  elB.cash.classList.add('hidden');
  elB.card.classList.remove('current');
}

function startGame(){
  deck=shuffle(MEMBERS);
  pos=1;
  streak=0;
  locked=false;
  best=loadBest();
  streakNumEl.textContent=streak;
  resultEl.textContent='';
  resultEl.className='result-banner';
  gameOverEl.classList.remove('show');
  guessRowEl.style.display='flex';
  renderA(deck[0]);
  renderB(deck[1]);
  btnHigher.disabled=false;
  btnLower.disabled=false;
}

function guess(dir){
  if(locked) return;
  locked=true;
  btnHigher.disabled=true;
  btnLower.disabled=true;
  var a=deck[pos-1],b=deck[pos];
  var actuallyHigher=b.cash>a.cash;
  var correct=(dir==='higher')===actuallyHigher;
  elB.cash.textContent=fmtCash(b.cash);
  elB.cash.classList.remove('hidden');
  if(correct){
    streak++;
    streakNumEl.textContent=streak;
    resultEl.textContent='Correct — '+b.name+' had '+(actuallyHigher?'more':'less');
    resultEl.className='result-banner correct';
    if(streak>best){best=streak;saveBest(best);}
    setTimeout(function(){
      pos++;
      if(pos>=deck.length){
        deck=shuffle(MEMBERS);
        pos=1;
        renderA(deck[0]);
      } else {
        renderA(deck[pos-1]);
      }
      renderB(deck[pos]);
      resultEl.textContent='';
      resultEl.className='result-banner';
      locked=false;
      btnHigher.disabled=false;
      btnLower.disabled=false;
    },1100);
  } else {
    resultEl.textContent='Wrong — '+b.name+' had '+(actuallyHigher?'more':'less');
    resultEl.className='result-banner wrong';
    setTimeout(function(){
      guessRowEl.style.display='none';
      document.getElementById('final-streak').textContent=streak;
      document.getElementById('best-streak').textContent=best;
      gameOverEl.classList.add('show');
      showSubmitForm(streak);
    },1100);
  }
}

btnHigher.addEventListener('click',function(){guess('higher');});
btnLower.addEventListener('click',function(){guess('lower');});
document.getElementById('replay-btn').addEventListener('click',startGame);

// ── leaderboard ──
var LB_NAME_KEY='warchest-lb-name';
var lbListEl=document.getElementById('lb-list');
var lbFormEl=document.getElementById('lb-submit-form');
var lbNameInput=document.getElementById('lb-name-input');
var lbSubmitBtn=document.getElementById('lb-submit-btn');
var lbStatusEl=document.getElementById('lb-status');

function renderLeaderboard(scores){
  lbListEl.innerHTML='';
  if(!scores||!scores.length){
    var li=document.createElement('li');
    li.className='lb-empty';
    li.textContent='No streaks yet — be the first on the board.';
    lbListEl.appendChild(li);
    return;
  }
  scores.forEach(function(s,i){
    var li=document.createElement('li');
    li.className='lb-row';
    var rank=document.createElement('span');
    rank.className='lb-rank';
    rank.textContent=(i+1)+'.';
    var name=document.createElement('span');
    name.className='lb-name';
    name.textContent=s.name;
    var streakEl=document.createElement('span');
    streakEl.className='lb-streak';
    streakEl.textContent=s.streak;
    li.appendChild(rank);li.appendChild(name);li.appendChild(streakEl);
    lbListEl.appendChild(li);
  });
}

function loadLeaderboard(){
  fetch('/api/leaderboard').then(function(r){return r.json();}).then(function(data){
    renderLeaderboard(data.scores||[]);
  }).catch(function(){
    renderLeaderboard([]);
  });
}

function showSubmitForm(finalStreak){
  if(finalStreak>0){
    lbFormEl.style.display='flex';
    lbNameInput.value=localStorage.getItem(LB_NAME_KEY)||'';
    lbSubmitBtn.disabled=false;
    lbStatusEl.textContent='';
    lbStatusEl.className='lb-status';
  } else {
    lbFormEl.style.display='none';
    lbStatusEl.textContent='';
  }
}

lbFormEl.addEventListener('submit',function(e){
  e.preventDefault();
  var name=lbNameInput.value.trim().slice(0,20)||'Anonymous';
  localStorage.setItem(LB_NAME_KEY,name);
  lbSubmitBtn.disabled=true;
  lbStatusEl.textContent='Submitting…';
  lbStatusEl.className='lb-status';
  fetch('/api/leaderboard',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:name,streak:streak})
  }).then(function(r){return r.json();}).then(function(data){
    if(data.error){
      lbStatusEl.textContent='Could not submit — try again';
      lbSubmitBtn.disabled=false;
      return;
    }
    renderLeaderboard(data.scores||[]);
    lbStatusEl.textContent='Submitted to the leaderboard';
    lbStatusEl.className='lb-status ok';
    lbFormEl.style.display='none';
  }).catch(function(){
    lbStatusEl.textContent='Could not submit — try again';
    lbSubmitBtn.disabled=false;
  });
});

loadLeaderboard();
startGame();
</script>
