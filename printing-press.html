<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Press (pixel art) — Mark Alfred Dot News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.masthead-sm{
  font-family:"Chomsky",serif;
  font-size:clamp(18px,2.4vw,28px);
  font-weight:400;
  letter-spacing:-0.02em;
  line-height:1;
  text-transform:none;
  position:static;
  transform:none;
  white-space:nowrap;
}
.masthead-sm a{color:var(--ink);text-decoration:none}
.utility{align-items:center;padding:8px 0}
nav a{color:var(--muted)}
nav a:hover{color:var(--red)}
.social a{border-color:var(--rule-soft)}

.press-head{text-align:center;padding:26px 0 18px}
.press-title{
  font-family:Georgia,"Times New Roman",serif;
  font-weight:700;
  font-size:clamp(28px,4.4vw,44px);
  letter-spacing:-0.02em;
  text-transform:uppercase;
  color:var(--ink);
}
.press-sub{
  font-family:"Libre Caslon Text",serif;
  font-style:italic;
  font-size:14px;
  color:var(--ink-soft);
  margin-top:6px;
}

/* ── full-screen press: canvas fills the whole viewport, corner to corner ── */
.press-full{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  height:100dvh;
  background:#0b0d10;
  overflow:hidden;
  z-index:3; /* above the paper-noise overlay */
}
#press{
  display:block;
  width:100%;
  height:100%;
  image-rendering:pixelated;
  image-rendering:-moz-crisp-edges;
  image-rendering:crisp-edges;
}
</style>
</head>
<body>

<div class="press-full">
  <canvas id="press" width="320" height="320"></canvas>
</div>
<script src="press-scene.js"></script>
</body>
</html>
